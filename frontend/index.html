<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Segregation Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">
    <nav class="bg-blue-600 text-white shadow-md py-4">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">Face Segregation System</h1>
            <div id="stats" class="text-sm font-medium opacity-90">Loading stats...</div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Upload Section -->
            <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">1. Add to Database</h2>
                <p class="text-gray-500 text-sm mb-4">Upload images to be processed and added to the face database.</p>
                <form id="uploadForm" class="space-y-4">
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:bg-gray-50 transition-colors">
                        <input type="file" id="dbImages" multiple accept="image/*" class="block w-full text-sm text-gray-500
                            file:mr-4 file:py-2 file:px-4
                            file:rounded-md file:border-0
                            file:text-sm file:font-semibold
                            file:bg-blue-50 file:text-blue-700
                            hover:file:bg-blue-100 cursor-pointer
                        ">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-colors flex justify-center items-center">
                        <span id="uploadText">Upload Images</span>
                        <div id="uploadLoader" class="loader hidden ml-2 border-t-white" style="width: 20px; height: 20px; border-width: 3px;"></div>
                    </button>
                </form>
                <div id="uploadMessage" class="mt-3 text-sm hidden"></div>
            </section>

            <!-- Search Section -->
            <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">2. Search by Face</h2>
                <p class="text-gray-500 text-sm mb-4">Upload a photo of a person to find where they appear in the database.</p>
                <form id="searchForm" class="space-y-4">
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:bg-gray-50 transition-colors">
                        <input type="file" id="searchImage" accept="image/*" class="block w-full text-sm text-gray-500
                            file:mr-4 file:py-2 file:px-4
                            file:rounded-md file:border-0
                            file:text-sm file:font-semibold
                            file:bg-green-50 file:text-green-700
                            hover:file:bg-green-100 cursor-pointer
                        ">
                    </div>
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-md transition-colors flex justify-center items-center">
                        <span id="searchText">Search Images</span>
                        <div id="searchLoader" class="loader hidden ml-2 border-t-white" style="width: 20px; height: 20px; border-width: 3px;"></div>
                    </button>
                </form>
            </section>
        </div>

        <!-- Results Section -->
        <section class="mt-12" id="resultsSection" style="display: none;">
            <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Search Results</h2>
            <div id="resultsCount" class="mb-4 text-gray-600"></div>
            <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Results will be injected here -->
            </div>
        </section>
    </main>

    <script>
        // API Base URL
        const API_BASE = '/api';

        // Load stats on page load
        async function fetchStats() {
            try {
                const res = await fetch(`${API_BASE}/stats`);
                const data = await res.json();
                document.getElementById('stats').innerText = 
                    `${data.total_images} Images | ${data.total_faces} Faces | ${data.total_persons} Persons`;
            } catch (err) {
                console.error("Failed to fetch stats", err);
            }
        }

        // Handle Image Upload to Database
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const files = document.getElementById('dbImages').files;
            if (files.length === 0) return alert('Please select files to upload');

            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }

            const btnText = document.getElementById('uploadText');
            const loader = document.getElementById('uploadLoader');
            const msg = document.getElementById('uploadMessage');
            
            btnText.innerText = 'Uploading & Processing...';
            loader.classList.remove('hidden');
            msg.classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE}/images/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (res.ok) {
                    const data = await res.json();
                    msg.innerHTML = `<span class="text-green-600 font-medium">Successfully processed ${data.length} image(s)!</span>`;
                    document.getElementById('dbImages').value = ''; // clear input
                    fetchStats(); // Update stats
                } else {
                    const error = await res.json();
                    msg.innerHTML = `<span class="text-red-600">Error: ${error.detail || 'Upload failed'}</span>`;
                }
            } catch (err) {
                msg.innerHTML = `<span class="text-red-600">Network error occurred</span>`;
            } finally {
                msg.classList.remove('hidden');
                btnText.innerText = 'Upload Images';
                loader.classList.add('hidden');
            }
        });

        // Handle Face Search
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('searchImage');
            if (fileInput.files.length === 0) return alert('Please select an image to search');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const btnText = document.getElementById('searchText');
            const loader = document.getElementById('searchLoader');
            const resultsSection = document.getElementById('resultsSection');
            const resultsGrid = document.getElementById('resultsGrid');
            const resultsCount = document.getElementById('resultsCount');
            
            btnText.innerText = 'Searching Database...';
            loader.classList.remove('hidden');
            resultsSection.style.display = 'block';
            resultsGrid.innerHTML = '';
            resultsCount.innerHTML = 'Searching...';

            try {
                const res = await fetch(`${API_BASE}/search/by-face`, {
                    method: 'POST',
                    body: formData
                });
                
                if (res.ok) {
                    const data = await res.json();
                    
                    if (data.total_matches === 0) {
                        resultsCount.innerHTML = `<span class="text-gray-500">No matching faces found in the database.</span>`;
                        return;
                    }

                    resultsCount.innerHTML = `<span class="text-green-600 font-medium">Found ${data.total_matches} match(es)!</span>`;
                    
                    data.results.forEach(match => {
                        // match contains { image, face, distance, similarity_percent }
                        const card = document.createElement('div');
                        card.className = 'bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow';
                        
                        card.innerHTML = `
                            <div class="relative pb-[75%] bg-gray-100">
                                <img src="/${match.image.filepath}" class="absolute top-0 left-0 w-full h-full object-cover" alt="Matched image">
                            </div>
                            <div class="p-4">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs font-semibold px-2 py-1 bg-green-100 text-green-800 rounded-full">
                                        ${match.similarity_percent}% Match
                                    </span>
                                    <img src="/${match.face.thumbnail_path}" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover" title="Matched Face">
                                </div>
                                <p class="text-xs text-gray-500 truncate mt-2" title="${match.image.original_filename}">${match.image.original_filename}</p>
                            </div>
                        `;
                        resultsGrid.appendChild(card);
                    });
                } else {
                    const error = await res.json();
                    resultsCount.innerHTML = `<span class="text-red-600">Error: ${error.detail || 'Search failed'}</span>`;
                }
            } catch (err) {
                console.error(err);
                resultsCount.innerHTML = `<span class="text-red-600">Network error occurred during search</span>`;
            } finally {
                btnText.innerText = 'Search Images';
                loader.classList.add('hidden');
            }
        });

        // Initialize
        fetchStats();
    </script>
</body>
</html>
